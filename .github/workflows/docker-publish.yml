name: Publish Docker Images

on:
  push:
    branches:
      - main
      - codex/haha-chatbot
  workflow_dispatch:

env:
  DOCKERHUB_NAMESPACE: zhouhaha

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          backend_tags="${DOCKERHUB_NAMESPACE}/hahabot-backend:sha-${GITHUB_SHA}"
          frontend_tags="${DOCKERHUB_NAMESPACE}/hahabot-frontend:sha-${GITHUB_SHA}"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            backend_tags="${backend_tags}"$'\n'"${DOCKERHUB_NAMESPACE}/hahabot-backend:latest"
            frontend_tags="${frontend_tags}"$'\n'"${DOCKERHUB_NAMESPACE}/hahabot-frontend:latest"
          fi

          {
            echo 'backend_tags<<EOF'
            echo "${backend_tags}"
            echo 'EOF'
            echo 'frontend_tags<<EOF'
            echo "${frontend_tags}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
